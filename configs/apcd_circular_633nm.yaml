project:
  name: blue_plane_wave_metasurface
  stage: later_apcd_circular_633nm_reference

target:
  wavelength_nm: 633
  incident_wave: plane_wave
  output_basis: circular
  target_polarization_type: circular
  eps: 1.0e-12
  spin_er_threshold_db: 8
  conversion_to_leakage_threshold: 6

material:
  substrate: Al2O3
  meta_material: c-Si
  substrate_material_lumerical: "<Object defined dielectric>"
  meta_material_lumerical: "<Object defined dielectric>"
  substrate_index: 1.76
  meta_index: 3.88

geometry:
  layout_mode: apcd_fractional
  period_x_nm: 340
  period_y_nm: 340
  height_nm: 300
  minimum_gap_nm: 5
  nanopillar_1:
    length_nm: 160
    width_nm: 75
    frac_x: 0.75
    frac_y: 0.75
    rotation_deg: 0
  nanopillar_2:
    length_nm: 165
    width_nm: 100
    frac_x: 0.25
    frac_y: 0.25
    rotation_deg: 0

simulation:
  substrate_thickness_nm: 220
  source_offset_nm: 120
  monitor_offset_nm: 180
  z_padding_above_nm: 260
  mesh_accuracy: 1
  simulation_time_fs: 250

output:
  result_dir: outputs/apcd_circular_633nm
