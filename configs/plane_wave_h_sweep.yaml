project:
  name: blue_plane_wave_metasurface
  stage: first_paper_h_sweep

target:
  wavelength_nm: 450
  incident_wave: plane_wave
  incident_polarization: LCP
  output_polarization: RCP
  deflection_angle_deg: 15
  target_order: plus_1

material:
  metasurface: TiO2

geometry:
  supercell_atoms: 8
  atom_period_nm: 220
  supercell_period_um: 1.74

phase_design:
  method: geometric_phase
  phase_step_rad: 0.785398163
  rotation_step_deg: 22.5

thickness_sweep:
  h_min_nm: 250
  h_max_nm: 450
  h_step_nm: 25
  h_initial_nm: 350

output:
  result_dir: outputs/plane_wave_h_sweep

